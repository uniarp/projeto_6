<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutores</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="wrapper">
        <div class="sidebar">
            <button>Histórico clínico</button>
            <button>Acompanhamento</button>
            <button>Fila de castração</button>
            <button class="active">Tutores</button>
            <button>Atendimentos agendados - Consulta</button>
            <button>Agendar atendimentos</button>
            <button>Consulta</button>
        </div>
        <div class="main-content">
            <h1>TUTORES</h1>
            <div class="search-section">
                <!-- Search section -->
            </div>
            <div class="form-section">
                <form method="POST">
                    {% csrf_token %}
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="nome_tutor">Nome do tutor:</label>
                            <input type="text" id="nome_tutor" name="nome_tutor" />
                        </div>
                        <div class="form-group">
                            <label for="numero_cad">N° CAD único:</label>
                            <input type="text" id="numero_cad" name="numero_cad" />
                        </div>
                        <div class="form-group">
                            <label for="cpf">CPF:</label>
                            <input type="text" id="cpf" name="cpf" />
                        </div>
                        <div class="form-group">
                            <label for="cidade">Cidade:</label>
                            <input type="text" id="cidade" name="cidade" />
                        </div>
                        <div class="form-group">
                            <label for="estado">Estado:</label>
                            <input type="text" id="estado" name="estado" />
                        </div>
                        <div class="form-group">
                            <label for="endereco">Endereço:</label>
                            <input type="text" id="endereco" name="endereco" />
                        </div>
                        <div class="form-group">
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" />
                        </div>
                        <div class="form-group">
                            <label for="telefone">Telefone:</label>
                            <input type="tel" id="telefone" name="telefone" />
                        </div>
                        <div class="form-group">
                            <label for="tipo">Tipo:</label>
                            <select id="tipo" name="tipo">
                                <!-- Opções aqui -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="raca">Raça:</label>
                            <input type="text" id="raca" name="raca" />
                        </div>
                        <div class="form-group">
                            <label for="idade">Idade:</label>
                            <input type="number" id="idade" name="idade" />
                        </div>
                        <div class="form-group">
                            <label for="especie">Espécie:</label>
                            <input type="text" id="especie" name="especie" />
                        </div>
                        <div class="form-group">
                            <label for="peso">Peso médio:</label>
                            <input type="number" id="peso" name="peso" />
                        </div>
                        <div class="form-group">
                            <label for="rfid">N° RFID:</label>
                            <input type="text" id="rfid" name="rfid" />
                        </div>
                        <div class="form-group">
                            <label for="castrado">Castrado:</label>
                            <select id="castrado" name="castrado">
                                <option value="sim">Sim</option>
                                <option value="nao">Não</option>
                            </select>
                        </div>
                    </div>
                    <div class="button-section">
                        <button type="submit">SALVAR</button>
                        <button type="button">EXCLUIR</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <p>O tutor foi cadastrado com sucesso!</p>
        </div>
    </div>

    <!-- Inclua o arquivo JavaScript -->
    <script src="{% static 'js/script.js' %}"></script>

    <!-- Campo oculto para controlar a exibição do modal -->
    <input type="hidden" id="showModal" value="{{ show_modal }}">

</body>
</html>
